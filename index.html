<!DOCTYPE html>
<html>
<head>
    <title>DevOps Project</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }
        .box {
            margin-top: 100px;
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: inline-block;
        }
        h1 {
            font-size: 40px;
        }
        p {
            font-size: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: orange;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background: red;
            color: white;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🚀 DevOps Project</h1>
    <p>Deployed using Jenkins + GitHub</p>
    <button onclick="alert('Deployment Successful!')">Click Me</button>
</div>

</body>
</html>
